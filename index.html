<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Алтай в июле — тур по местам силы | Телецкое озеро</title>
  <meta name="description" content="Алтай в июле: тур по местам силы на Телецком озере. Практики, медитации, трансформационная игра Лила, природа и отдых в спокойном ритме." />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, sans-serif;
      color: #1d3442;
      background: #eef5f7;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1160px, 92%);
      margin: 0 auto;
    }

    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      padding: 24px 0;
      color: #fff;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-weight: 800;
      font-size: 21px;
      letter-spacing: 0.5px;
    }

    .phone {
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 999px;
      font-weight: 700;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(rgba(5, 22, 38, 0.58), rgba(5, 22, 38, 0.55)),
        url('images/lake-main.jpg') center/cover;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 120px 0 80px;
    }

    .hero-content {
      max-width: 820px;
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      padding: 8px 16px;
      border-radius: 999px;
      margin-bottom: 24px;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(42px, 7vw, 82px);
      line-height: 0.95;
      margin-bottom: 24px;
      max-width: 900px;
    }

    .hero p {
      font-size: 21px;
      max-width: 700px;
      margin-bottom: 34px;
      color: #f4ead9;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-block;
      padding: 15px 24px;
      border-radius: 14px;
      font-weight: 800;
      transition: 0.2s;
    }

    .btn-primary {
      background: #eec46a;
      color: #1f2a24;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    section {
      padding: 86px 0;
    }

    .section-title {
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.05;
      margin-bottom: 18px;
      color: #17384a;
    }

    .section-text {
      max-width: 760px;
      font-size: 18px;
      color: #5d6d63;
      margin-bottom: 38px;
    }

    .intro-grid,
    .places-grid,
    .important-grid,
    .program-grid {
      display: grid;
      gap: 20px;
    }

    .intro-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .places-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    .important-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .program-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    .card,
    .place,
    .practice,
    .form-box {
      background: #fffdf8;
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 14px 40px rgba(42, 52, 45, 0.08);
    }

    .card span,
    .place span,
    .practice span {
      font-size: 34px;
      display: block;
      margin-bottom: 12px;
    }

    .card h3,
    .place h3,
    .practice h3 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #17384a;
    }

    .card p,
    .place p,
    .practice p {
      color: #607068;
    }

    .lake {
      background: #dfecef;
    }

    .lake-wrap,
    .about-wrap,
    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 42px;
      align-items: center;
    }

    .image-box {
      border-radius: 30px;
      overflow: hidden;
      min-height: 480px;
      background: url('images/lake-main.jpg') center/cover;
      box-shadow: 0 18px 50px rgba(13, 43, 58, 0.16);
    }

    .about-img {
      background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1200&q=80');
    }

    .list {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .list div {
      background: #fffdf8;
      padding: 16px 18px;
      border-radius: 16px;
      color: #34483d;
      font-weight: 700;
    }

    .places {
      background: #eef5f7;
    }

    .practices {
      background: #17384a;
      color: #fff;
    }

    .practices .section-title,
    .practices .section-text {
      color: #fff;
    }

    .practice {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      color: #fff;
    }

    .practice h3,
    .practice p {
      color: #fff;
    }

    .program {
      background: #dfecef;
    }

    .highlight {
      background: #fffdf8;
      border-radius: 28px;
      padding: 34px;
      margin-top: 34px;
      border-left: 6px solid #7fb6c8;
      font-size: 20px;
      color: #34483d;
    }

    .gallery-section {
      background: #eef5f7;
    }
